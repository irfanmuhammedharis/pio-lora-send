; PlatformIO port of Zephyr samples/drivers/lora/send
; nRF52840 + LoRa radio, Arduino framework + RadioLib

[platformio]
default_envs = xiao_a, xiao_b

[env]
platform = nordicnrf52
framework = arduino
monitor_speed = 115200
lib_deps =
    jgromes/RadioLib@^7.1.2

; Seeed XIAO nRF52840 (Sense) + SX1262 (e.g. Wio-SX1262 extension board)
; Board def comes from the community platform fork (not in official registry)
[env:xiao_sx1262]
board = seeed_xiao_nrf52840_sense
build_flags =
    -DUSE_SX1262
    -DLORA_CS=D4
    -DLORA_DIO1=D1
    -DLORA_RST=D2
    -DLORA_BUSY=D3

; Transceiver ping-pong: node A initiates, node B replies
[env:xiao_a]
extends = env:xiao_sx1262
board = seeed_xiao_nrf52840_sense
build_flags =
    ${env:xiao_sx1262.build_flags}
    -DNODE_A

[env:xiao_b]
extends = env:xiao_sx1262
board = seeed_xiao_nrf52840_sense

; RAK4631 (WisBlock): nRF52840 with on-module SX1262
[env:rak4631]
board = wiscore_rak4631
build_flags =
    -DUSE_SX1262
    -DLORA_CS=42
    -DLORA_DIO1=47
    -DLORA_RST=38
    -DLORA_BUSY=46

; Adafruit Feather nRF52840 + external SX1276 breakout (e.g. RFM95)
; Adjust the pin numbers to your wiring
[env:feather_sx1276]
board = adafruit_feather_nrf52840
build_flags =
    -DUSE_SX1276
    -DLORA_CS=5
    -DLORA_DIO0=6
    -DLORA_RST=9
    -DLORA_DIO1=10
